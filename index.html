<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA World Cup 2026 | 世界杯赛程</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css?v=12">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'wc-dark': '#0a0e1a',
            'wc-card': '#141b2d',
            'wc-border': '#1e2a45',
            'wc-gold': '#d4a843',
            'wc-gold-light': '#f0d060',
            'wc-green': '#00c853',
            'wc-red': '#ff1744',
            'wc-blue': '#2979ff',
            'wc-text': '#e8eaf6',
            'wc-muted': '#7986cb',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-wc-dark text-wc-text min-h-screen">
  <!-- Header -->
  <header class="sticky top-0 z-50 bg-wc-dark/95 backdrop-blur border-b border-wc-border">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl">⚽</span>
        <h1 class="text-lg font-bold bg-gradient-to-r from-wc-gold to-wc-gold-light bg-clip-text text-transparent">
          <span data-i18n="title">FIFA 世界杯 2026</span>
        </h1>
      </div>
      <div class="flex items-center gap-3">
        <!-- Nav Tabs -->
        <nav class="hidden sm:flex gap-1" id="mainNav">
          <button class="nav-tab active" data-tab="schedule" data-i18n="nav_schedule">赛程</button>
          <button class="nav-tab" data-tab="standings" data-i18n="nav_standings">积分榜</button>
          <button class="nav-tab" data-tab="bracket" data-i18n="nav_bracket">对阵图</button>
        </nav>
        <!-- Language Toggle -->
        <button id="langToggle" class="px-3 py-1.5 rounded-lg bg-wc-border text-sm font-medium hover:bg-wc-blue/20 transition-colors">
          EN
        </button>
        <!-- Mobile Menu -->
        <button id="mobileMenuBtn" class="sm:hidden p-2 rounded-lg hover:bg-wc-border transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
    </div>
    <!-- Mobile Nav -->
    <div id="mobileNav" class="hidden sm:hidden border-t border-wc-border px-4 py-2">
      <button class="mobile-nav-tab active" data-tab="schedule" data-i18n="nav_schedule">赛程</button>
      <button class="mobile-nav-tab" data-tab="standings" data-i18n="nav_standings">积分榜</button>
      <button class="mobile-nav-tab" data-tab="bracket" data-i18n="nav_bracket">对阵图</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 py-6">
    <!-- Schedule Tab -->
    <section id="scheduleView" class="tab-content">
      <!-- Date/Group Filter -->
      <div class="flex flex-wrap gap-2 mb-6" id="scheduleFilters">
        <div class="flex gap-1 bg-wc-card rounded-xl p-1 border border-wc-border">
          <button class="filter-btn active" data-filter="byDate" data-i18n="filter_by_date">按日期</button>
          <button class="filter-btn" data-filter="byGroup" data-i18n="filter_by_group">按分组</button>
        </div>
      </div>
      <!-- Match List -->
      <div id="scheduleList" class="space-y-3"></div>
      <!-- Loading -->
      <div id="scheduleLoading" class="flex flex-col items-center justify-center py-20">
        <div class="spinner mb-4"></div>
        <p class="text-wc-muted text-sm" data-i18n="loading">加载中...</p>
      </div>
    </section>

    <!-- Standings Tab -->
    <section id="standingsView" class="tab-content hidden">
      <div class="flex gap-1 bg-wc-card rounded-xl p-1 border border-wc-border mb-6 overflow-x-auto" id="groupTabs"></div>
      <div id="standingsContent"></div>
      <div id="standingsLoading" class="flex flex-col items-center justify-center py-20">
        <div class="spinner mb-4"></div>
        <p class="text-wc-muted text-sm" data-i18n="loading">加载中...</p>
      </div>
    </section>

    <!-- Bracket Tab -->
    <section id="bracketView" class="tab-content hidden">
      <div id="bracketContent" class="overflow-x-auto pb-4"></div>
      <div id="bracketLoading" class="flex flex-col items-center justify-center py-20">
        <div class="spinner mb-4"></div>
        <p class="text-wc-muted text-sm" data-i18n="loading">加载中...</p>
      </div>
    </section>
  </main>

  <!-- Match Detail Modal -->
  <div id="matchModal" class="fixed inset-0 z-[100] hidden">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" id="modalOverlay"></div>
    <div class="absolute inset-x-4 top-[5%] bottom-[5%] sm:inset-x-auto sm:left-1/2 sm:-translate-x-1/2 sm:w-full sm:max-w-lg bg-wc-card rounded-2xl border border-wc-border overflow-hidden flex flex-col">
      <!-- Modal Header -->
      <div class="flex items-center justify-between p-4 border-b border-wc-border">
        <div id="modalTitle" class="text-sm text-wc-muted"></div>
        <button id="modalClose" class="p-1.5 rounded-lg hover:bg-wc-border transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <!-- Modal Body -->
      <div id="modalBody" class="flex-1 overflow-y-auto p-4"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/i18n.js?v=13"></script>
  <script src="js/utils.js?v=11"></script>
  <script src="js/api.js?v=9"></script>
  <script src="js/schedule.js?v=11"></script>
  <script src="js/standings.js?v=6"></script>
  <script src="js/matchDetail.js?v=10"></script>
  <script src="js/bracket.js?v=13"></script>
  <script src="js/app.js?v=11"></script>
</body>
</html>
